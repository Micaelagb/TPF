<!DOCTYPE html>
<html lang = "es">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <!-- Frameworks y Estilos -->
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- BootStrap Icons -->
         <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <!-- Custom CSS -->
        <link rel="stylesheet" href="/css/stylesLogin.css">
    </head>
    <body>
        <div class="container py-5">
            <h1 class="my-4">Acceso al Sistema</h1>

            <form id="formLogin">
                <!-- Bloque Usuario -->
                <div class = "form-group">
                    <label for="usuario" class="form-label">Usuario:</label> 
                    <div class="envoltorio-input">
                        <input type="text" class= "form-control" id="usuario" required placeholder="Introduzca su usuario">
                        <span class="icon-inside"><i class="bi bi-person-fill"></i></span>
                    </div> 
                </div>
                <!-- Bloque Clave -->
                <div class = "form-group">
                    <label for="clave" class="form-label">Clave:</label> 
                    <div class="envoltorio-input">
                        <input type="password" class= "form-control" id="clave" required placeholder="Introduzca su clave">
                        <span class="icon-inside"><i class="bi bi-lock-fill"></i></span>
                    </div>
                </div>
                
                <button type= "submit" class="btn btn-primary">Ingresar</button>
            </form>

            <div id="msgError" class="alert alert-danger mt-3 d-none" role="alert"></div>
        </div>

        <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
        <script src="/js/login.js"></script>
    </body>
</html>
